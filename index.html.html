<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチテスト結果入力 ＆ レーダーチャート</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        /* 画面切り替えタブのスタイル */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            background-color: #edf2f7;
            color: #4a5568;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #3182ce;
            color: white;
        }

        /* 各画面の表示・非表示制御 */
        .page-content {
            display: none;
        }
        .page-content.active {
            display: block;
        }

        .chart-container {
            position: relative;
            margin: 0 auto 20px auto;
            height: 280px;
            width: 280px;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 450px;
        }
        .result-table th, .result-table td {
            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
        }
        .result-table th {
            background-color: #edf2f7;
            color: #4a5568;
            font-size: 13px;
        }
        input {
            padding: 8px 4px;
            font-size: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            text-align: center;
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #3182ce;
            outline: none;
            background-color: #f7fafc;
        }
        .subject-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        input[type="text"].subject {
            width: 75px;
            font-weight: bold;
        }
        input[type="text"].test-title {
            width: 75px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 55px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-appearance: none;
        }
        .btn-add { background-color: #48bb78; color: white; }
        .btn-add:hover { background-color: #38a169; }
        .btn-subject-add { background-color: #3182ce; color: white; margin-bottom: 25px; display: block; width: 100%; max-width: 200px; margin-left: auto; margin-right: auto;}
        .btn-subject-add:hover { background-color: #2b6cb0; }
        .btn-delete { background-color: #e53e3e; color: white; padding: 6px 10px; font-size: 12px; }
        .btn-delete:hover { background-color: #c53030; }
        .btn-sub-delete { background-color: #fed7d7; color: #e53e3e; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        .btn-sub-delete:hover { background-color: #feb2b2; }
        
        .total-row {
            font-weight: bold;
            background-color: #f7fafc;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>テスト結果管理</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchPage('inputPage')">✍️ 入力画面</button>
        <button class="tab-btn" onclick="switchPage('chartPage')">📊 レーダーチャート</button>
    </div>

    <div id="inputPage" class="page-content active">
        <div class="btn-container">
            <button class="btn-add" onclick="addTestData()">＋ データを追加</button>
        </div>
        
        <div class="table-wrapper">
            <table class="result-table" id="resultTable">
                <thead>
                    <tr id="headerRow">
                        <th>教科名</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
                <tfoot>
                    <tr id="totalRow" class="total-row">
                        <td>合計</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <button class="btn-subject-add" onclick="addSubjectRow()">＋ 教科を追加</button>
    </div>

    <div id="chartPage" class="page-content">
        <div class="chart-container">
            <canvas id="radarChart"></canvas>
        </div>
    </div>
</div>

<script>
    const colorPalette = [
        { bg: 'rgba(66, 153, 225, 0.2)', border: 'rgba(66, 153, 225, 1)' },
        { bg: 'rgba(245, 158, 11, 0.2)', border: 'rgba(245, 158, 11, 1)' },
        { bg: 'rgba(159, 122, 234, 0.2)', border: 'rgba(159, 122, 234, 1)' },
        { bg: 'rgba(241, 76, 76, 0.2)', border: 'rgba(241, 76, 76, 1)' },
        { bg: 'rgba(72, 187, 120, 0.2)', border: 'rgba(72, 187, 120, 1)' }
    ];

    let testCount = 0;
    let activeTestIds = [];

    // グラフの初期化
    const ctx = document.getElementById('radarChart').getContext('2d');
    const radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: [],
            datasets: []
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { r: { suggestedMin: 0, suggestedMax: 100 } }
        }
    });

    // 画面切り替え関数
    function switchPage(pageId) {
        // ボタンのactive切り替え
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (pageId === 'inputPage') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        if (pageId === 'chartPage') document.querySelectorAll('.tab-btn')[1].classList.add('active');

        // コンテンツの切り替え
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');

        // グラフ画面に移ったときは最新データでグラフを更新
        if (pageId === 'chartPage') {
            updateChartAndTotals(false);
        }
    }

    function saveToLocalStorage() {
        const dataToSave = {
            activeTestIds: activeTestIds,
            testCount: testCount,
            testTitles: {},
            subjects: [],
            scores: {}
        };

        activeTestIds.forEach(id => {
            const titleInput = document.querySelector(`#headerRow .col-${id} .test-title`);
            dataToSave.testTitles[id] = titleInput ? titleInput.value : `テスト${id}`;
        });

        const rows = document.querySelectorAll('#tableBody tr.subject-row');
        rows.forEach((row, rowIndex) => {
            const subjInput = row.querySelector('.subject');
            dataToSave.subjects.push(subjInput ? subjInput.value : '');

            activeTestIds.forEach(id => {
                const scoreInput = row.querySelector(`.score-${id}`);
                if (!dataToSave.scores[id]) dataToSave.scores[id] = [];
                dataToSave.scores[id].push(scoreInput ? (parseInt(scoreInput.value) || 0) : 80);
            });
        });

        localStorage.setItem('radarChartTestData', JSON.stringify(dataToSave));
    }

    function loadFromLocalStorage() {
        const savedData = localStorage.getItem('radarChartTestData');
        if (!savedData) {
            initDefaultData();
            return;
        }

        try {
            const data = JSON.parse(savedData);
            testCount = data.testCount || 0;
            activeTestIds = data.activeTestIds || [];

            const headerRow = document.getElementById('headerRow');
            activeTestIds.forEach((id, index) => {
                const th = document.createElement('th');
                th.className = `col-${id}`;
                th.innerHTML = `
                    <input type="text" class="test-title" value="${data.testTitles[id] || 'テスト'+id}" oninput="updateChartAndTotals()"><br>
                    <button class="btn-delete" onclick="deleteColumn(${id})" style="margin-top:5px;">削除</button>
                `;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById('tableBody');
            data.subjects.forEach((subj, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = "subject-row";

                let html = `<td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="${subj}"></div></td>`;
                
                activeTestIds.forEach(id => {
                    const val = (data.scores[id] && data.scores[id][rowIndex] !== undefined) ? data.scores[id][rowIndex] : 80;
                    html += `<td class="col-${id}"><input type="number" class="score-${id}" value="${val}" min="0" max="100" oninput="updateChartAndTotals()"></td>`;
                });

                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            const totalRow = document.getElementById('totalRow');
            activeTestIds.forEach(id => {
                const totalTd = document.createElement('td');
                totalTd.className = `col-${id}`;
                totalTd.innerHTML = `<span id="total-${id}">0</span>`;
                totalRow.appendChild(totalTd);
            });

            updateChartAndTotals(false);

        } catch (e) {
            console.error("データの復元に失敗しました。", e);
            initDefaultData();
        }
    }

    function initDefaultData() {
        const tbody = document.getElementById('tableBody');
        const defaultSubjects = ["国語", "数学", "英語", "理科", "社会"];
        
        defaultSubjects.forEach(subj => {
            const tr = document.createElement('tr');
            tr.className = "subject-row";
            tr.innerHTML = `<td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="${subj}"></div></td>`;
            tbody.appendChild(tr);
        });

        addTestData(false);
        addTestData(false);
        
        const score1Inputs = document.querySelectorAll('.score-1');
        if(score1Inputs.length >= 5) score1Inputs[0].value = 85;
        
        const score2Vals = [70, 85, 75, 90, 65];
        document.querySelectorAll('.score-2').forEach((el, i) => {
            if(score2Vals[i] !== undefined) el.value = score2Vals[i];
        });

        updateChartAndTotals(true);
    }

    function addTestData(shouldSave = true) {
        testCount++;
        const currentId = testCount;
        activeTestIds.push(currentId);

        const headerRow = document.getElementById('headerRow');
        const th = document.createElement('th');
        th.className = `col-${currentId}`;
        th.innerHTML = `
            <input type="text" class="test-title" value="テスト${currentId}" oninput="updateChartAndTotals()"><br>
            <button class="btn-delete" onclick="deleteColumn(${currentId})" style="margin-top:5px;">削除</button>
        `;
        headerRow.appendChild(th);

        const rows = document.querySelectorAll('#tableBody tr.subject-row');
        rows.forEach(row => {
            const td = document.createElement('td');
            td.className = `col-${currentId}`;
            td.innerHTML = `<input type="number" class="score-${currentId}" value="80" min="0" max="100" oninput="updateChartAndTotals()">`;
            row.appendChild(td);
        });

        const totalRow = document.getElementById('totalRow');
        const totalTd = document.createElement('td');
        totalTd.className = `col-${currentId}`;
        totalTd.innerHTML = `<span id="total-${currentId}">0</span>`;
        totalRow.appendChild(totalTd);

        updateChartAndTotals(shouldSave);
    }

    function addSubjectRow() {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.className = "subject-row";

        let html = `<td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="新教科"></div></td>`;
        
        activeTestIds.forEach(id => {
            html += `<td class="col-${id}"><input type="number" class="score-${id}" value="80" min="0" max="100" oninput="updateChartAndTotals()"></td>`;
        });

        tr.innerHTML = html;
        tbody.appendChild(tr);
        updateChartAndTotals(true);
    }

    function deleteSubjectRow(button) {
        const row = button.closest('tr');
        row.remove();
        updateChartAndTotals(true);
    }

    function deleteColumn(id) {
        document.querySelectorAll(`.col-${id}`).forEach(el => el.remove());
        activeTestIds = activeTestIds.filter(testId => testId !== id);
        updateChartAndTotals(true);
    }

    function updateChartAndTotals(shouldSave = true) {
        const subjectInputs = document.querySelectorAll('.subject');
        const subjects = [];
        subjectInputs.forEach(input => {
            subjects.push(input.value || '未入力');
        });
        radarChart.data.labels = subjects;

        radarChart.data.datasets = [];
        activeTestIds.forEach((id, index) => {
            const color = colorPalette[index % colorPalette.length];
            const titleInput = document.querySelector(`#headerRow .col-${id} .test-title`);
            const labelStr = titleInput ? titleInput.value : `テスト${id}`;

            const scoreInputs = document.querySelectorAll(`.score-${id}`);
            const scores = [];
            let total = 0;

            scoreInputs.forEach(input => {
                const val = parseInt(input.value) || 0;
                scores.push(val);
                total += val;
            });

            radarChart.data.datasets.push({
                label: labelStr,
                data: scores,
                backgroundColor: color.bg,
                borderColor: color.border,
                borderWidth: 2,
                id: id
            });

            const totalSpan = document.getElementById(`total-${id}`);
            if (totalSpan) {
                totalSpan.textContent = total;
            }
        });

        radarChart.update();

        if (shouldSave) {
            saveToLocalStorage();
        }
    }

    document.getElementById('tableBody').addEventListener('input', (e) => {
        if (e.target.classList.contains('subject')) {
            updateChartAndTotals(true);
        }
    });

    window.addEventListener('DOMContentLoaded', loadFromLocalStorage);
</script>

</body>
</html>
