<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチテスト結果入力 ＆ レーダーチャート</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .chart-container {
            position: relative;
            margin: 0 auto 20px auto;
            height: 280px;
            width: 280px;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 450px;
        }
        .result-table th, .result-table td {
            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
        }
        .result-table th {
            background-color: #edf2f7;
            color: #4a5568;
            font-size: 13px;
        }
        input {
            padding: 8px 4px;
            font-size: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            text-align: center;
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #3182ce;
            outline: none;
            background-color: #f7fafc;
        }
        .subject-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        input[type="text"].subject {
            width: 75px;
            font-weight: bold;
        }
        input[type="text"].test-title {
            width: 75px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 55px;
        }
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-appearance: none;
        }
        .btn-add { background-color: #48bb78; color: white; }
        .btn-add:hover { background-color: #38a169; }
        .btn-subject-add { background-color: #3182ce; color: white; margin-bottom: 25px; display: block; width: 100%; max-width: 200px; margin-left: auto; margin-right: auto;}
        .btn-subject-add:hover { background-color: #2b6cb0; }
        .btn-delete { background-color: #e53e3e; color: white; padding: 6px 10px; font-size: 12px; }
        .btn-delete:hover { background-color: #c53030; }
        .btn-sub-delete { background-color: #fed7d7; color: #e53e3e; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        .btn-sub-delete:hover { background-color: #feb2b2; }
        
        .total-row {
            font-weight: bold;
            background-color: #f7fafc;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>テスト結果 マルチ入力</h1>
    
    <div class="chart-container">
        <canvas id="radarChart"></canvas>
    </div>

    <div class="btn-container">
        <button class="btn-add" onclick="addTestData()">＋ データを追加</button>
    </div>
    
    <div class="table-wrapper">
        <table class="result-table" id="resultTable">
            <thead>
                <tr id="headerRow">
                    <th>教科名</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="subject-row"><td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="国語"></div></td></tr>
                <tr class="subject-row"><td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="数学"></div></td></tr>
                <tr class="subject-row"><td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="英語"></div></td></tr>
                <tr class="subject-row"><td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="理科"></div></td></tr>
                <tr class="subject-row"><td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="社会"></div></td></tr>
            </tbody>
            <tfoot>
                <tr id="totalRow" class="total-row">
                    <td>合計</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <button class="btn-subject-add" onclick="addSubjectRow()">＋ 教科を追加</button>
</div>

<script>
    const colorPalette = [
        { bg: 'rgba(66, 153, 225, 0.2)', border: 'rgba(66, 153, 225, 1)' },
        { bg: 'rgba(245, 158, 11, 0.2)', border: 'rgba(245, 158, 11, 1)' },
        { bg: 'rgba(159, 122, 234, 0.2)', border: 'rgba(159, 122, 234, 1)' },
        { bg: 'rgba(241, 76, 76, 0.2)', border: 'rgba(241, 76, 76, 1)' },
        { bg: 'rgba(72, 187, 120, 0.2)', border: 'rgba(72, 187, 120, 1)' }
    ];

    let testCount = 0;
    let activeTestIds = []; // 現在存在するテストのIDを追跡

    const ctx = document.getElementById('radarChart').getContext('2d');
    const radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: [],
            datasets: []
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { r: { suggestedMin: 0, suggestedMax: 100 } }
        }
    });

    // 新しいテストデータ列を追加する関数
    function addTestData() {
        testCount++;
        const currentId = testCount;
        activeTestIds.push(currentId);
        const color = colorPalette[(activeTestIds.length - 1) % colorPalette.length];

        const headerRow = document.getElementById('headerRow');
        const th = document.createElement('th');
        th.className = `col-${currentId}`;
        th.innerHTML = `
            <input type="text" class="test-title" value="テスト${currentId}" oninput="updateChartAndTotals()"><br>
            <button class="btn-delete" onclick="deleteColumn(${currentId})" style="margin-top:5px;">削除</button>
        `;
        headerRow.appendChild(th);

        const rows = document.querySelectorAll('#tableBody tr.subject-row');
        rows.forEach(row => {
            const td = document.createElement('td');
            td.className = `col-${currentId}`;
            td.innerHTML = `<input type="number" class="score-${currentId}" value="80" min="0" max="100" oninput="updateChartAndTotals()">`;
            row.appendChild(td);
        });

        const totalRow = document.getElementById('totalRow');
        const totalTd = document.createElement('td');
        totalTd.className = `col-${currentId}`;
        totalTd.innerHTML = `<span id="total-${currentId}">0</span>`;
        totalRow.appendChild(totalTd);

        radarChart.data.datasets.push({
            label: `テスト${currentId}`,
            data: [],
            backgroundColor: color.bg,
            borderColor: color.border,
            borderWidth: 2,
            id: currentId
        });

        updateChartAndTotals();
    }

    // 新しい教科（行）を追加する関数
    function addSubjectRow() {
        const tbody = document.getElementById('tableBody');
        const tr = document.createElement('tr');
        tr.className = "subject-row";

        // 教科名入力セル
        let html = `<td><div class="subject-cell"><button class="btn-sub-delete" onclick="deleteSubjectRow(this)">✖</button><input type="text" class="subject" value="新教科"></div></td>`;
        
        // 現在存在するテストの数だけ、点数入力セルを作る
        activeTestIds.forEach(id => {
            html += `<td class="col-${id}"><input type="number" class="score-${id}" value="80" min="0" max="100" oninput="updateChartAndTotals()"></td>`;
        });

        tr.innerHTML = html;
        tbody.appendChild(tr);
        updateChartAndTotals();
    }

    // 教科（行）を削除する関数
    function deleteSubjectRow(button) {
        const row = button.closest('tr');
        row.remove();
        updateChartAndTotals();
    }

    // 列（テスト）を削除する関数
    function deleteColumn(id) {
        document.querySelectorAll(`.col-${id}`).forEach(el => el.remove());
        radarChart.data.datasets = radarChart.data.datasets.filter(ds => ds.id !== id);
        activeTestIds = activeTestIds.filter(testId => testId !== id);
        updateChartAndTotals();
    }

    // 全体の更新処理
    function updateChartAndTotals() {
        const subjectInputs = document.querySelectorAll('.subject');
        const subjects = [];
        subjectInputs.forEach(input => {
            subjects.push(input.value || '未入力');
        });
        radarChart.data.labels = subjects;

        radarChart.data.datasets.forEach(dataset => {
            const id = dataset.id;
            const titleInput = document.querySelector(`#headerRow .col-${id} .test-title`);
            if (titleInput) {
                dataset.label = titleInput.value || `テスト${id}`;
            }

            const scoreInputs = document.querySelectorAll(`.score-${id}`);
            const scores = [];
            let total = 0;

            scoreInputs.forEach(input => {
                const val = parseInt(input.value) || 0;
                scores.push(val);
                total += val;
            });

            dataset.data = scores;

            const totalSpan = document.getElementById(`total-${id}`);
            if (totalSpan) {
                totalSpan.textContent = total;
            }
        });

        radarChart.update();
    }

    // 教科名入力時のリアルタイム反映
    document.getElementById('tableBody').addEventListener('input', (e) => {
        if (e.target.classList.contains('subject')) {
            updateChartAndTotals();
        }
    });

    // 初期データ生成
    addTestData();
    addTestData();
    
    // サンプルの点数を少しバラけさせる
    const score1Inputs = document.querySelectorAll('.score-1');
    if(score1Inputs.length >= 5) score1Inputs[0].value = 85;
    
    const score2Vals = [70, 85, 75, 90, 65];
    document.querySelectorAll('.score-2').forEach((el, i) => {
        if(score2Vals[i] !== undefined) el.value = score2Vals[i];
    });

    updateChartAndTotals();
</script>

</body>
</html>
